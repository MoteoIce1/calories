<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Трекер Диеты</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { background-color: #000; margin: 0; padding: 0; overscroll-behavior-y: none; -webkit-tap-highlight-color: transparent; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    ::-webkit-scrollbar { width: 0px; background: transparent; }
    .safe-pb { padding-bottom: max(16px, env(safe-area-inset-bottom)); }
    .fast-touch { touch-action: manipulation; }
    input[type="number"]::-webkit-inner-spin-button, 
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const IconPlus = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14m-7-7h14"/></svg>;
    const IconBook = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>;
    const IconCalendar = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
    const IconChevronLeft = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>;
    const IconChevronRight = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;
    const IconTrash = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6"/></svg>;
    const IconTarget = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
    const IconCheck = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;

    // ЖЕСТКО ЗАШИТАЯ БАЗА (То, что ты просил)
    const HARDCODED_FOODS = [
      { id: 'h1', name: 'Котлета (говядина)', calories: 255, protein: 25 },
      { id: 'h2', name: 'Котлеты куриные', calories: 160, protein: 16 },
      { id: 'h3', name: 'Рыбные котлеты', calories: 140, protein: 14 },
      { id: 'h4', name: 'Куриное филе (сырое)', calories: 113, protein: 23.6 },
      { id: 'h5', name: 'Семга (филе слабосоленая)', calories: 200, protein: 20 },
      { id: 'h6', name: 'Пастеризованные белки', calories: 48, protein: 11 },
      { id: 'h7', name: 'Гречка вареная', calories: 132, protein: 4.5 },
      { id: 'h8', name: 'Картофельное пюре (на воде)', calories: 75, protein: 2 },
      { id: 'h9', name: 'Рис белый вареный', calories: 130, protein: 2.7 },
      { id: 'h10', name: 'Макароны отварные', calories: 112, protein: 4 },
      { id: 'h11', name: 'Оливковое масло', calories: 884, protein: 0 },
      { id: 'h12', name: 'Лук репчатый', calories: 41, protein: 1.4 },
      { id: 'h13', name: 'Помидор', calories: 19, protein: 1 },
      { id: 'h14', name: 'Огурец', calories: 15, protein: 1 },
      { id: 'h15', name: 'Батончик Snaq Fabriq', calories: 454, protein: 20 },
      { id: 'h16', name: 'Печенье', calories: 278, protein: 35 },
      { id: 'h17', name: 'Творог 5%', calories: 121, protein: 17 },
      { id: 'h18', name: 'Яйцо куриное (на 100г)', calories: 155, protein: 13 },
      { id: 'h19', name: 'Индейка (филе сырое)', calories: 115, protein: 24 },
      { id: 'h20', name: 'Говядина постная', calories: 187, protein: 29 }
    ];

    const getLocalDateString = (dateObj) => {
      const year = dateObj.getFullYear();
      const month = String(dateObj.getMonth() + 1).padStart(2, '0');
      const day = String(dateObj.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    };

    const displayDate = (dateString) => {
      const [year, month, day] = dateString.split('-');
      const d = new Date(year, month - 1, day);
      const todayStr = getLocalDateString(new Date());
      if (dateString === todayStr) return 'Сегодня';
      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      if (dateString === getLocalDateString(yesterday)) return 'Вчера';
      return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
    };

    function App() {
      const [goals, setGoals] = useState(() => JSON.parse(localStorage.getItem('goals_v9')) || { calories: 1800, protein: 150 });
      
      const [foods, setFoods] = useState(() => {
        const saved = JSON.parse(localStorage.getItem('foods_v9')) || [];
        // Добавляем новые хардкодные продукты к сохраненным (чтобы не дублировать)
        const newHardcoded = HARDCODED_FOODS.filter(hf => !saved.find(s => s.id === hf.id));
        return [...newHardcoded, ...saved];
      });

      const [dailyLogs, setDailyLogs] = useState(() => JSON.parse(localStorage.getItem('logs_v9')) || {});
      const [currentDate, setCurrentDate] = useState(getLocalDateString(new Date()));
      const [activeTab, setActiveTab] = useState('diary');
      
      const [selectedFoodId, setSelectedFoodId] = useState('');
      const [gramsInput, setGramsInput] = useState('');
      const [newFoodName, setNewFoodName] = useState('');
      const [newFoodCals, setNewFoodCals] = useState('');
      const [newFoodProtein, setNewFoodProtein] = useState('');

      const [editingLogId, setEditingLogId] = useState(null);
      const [editingFoodId, setEditingFoodId] = useState(null);
      const [editValue, setEditValue] = useState({});

      useEffect(() => localStorage.setItem('goals_v9', JSON.stringify(goals)), [goals]);
      useEffect(() => localStorage.setItem('foods_v9', JSON.stringify(foods)), [foods]);
      useEffect(() => localStorage.setItem('logs_v9', JSON.stringify(dailyLogs)), [dailyLogs]);

      const handleAddLog = (e) => {
        e.preventDefault();
        const food = foods.find(f => f.id === selectedFoodId);
        if (!food || !gramsInput) return;
        const grams = parseFloat(gramsInput);
        const newLog = {
          id: Date.now().toString(),
          foodId: food.id,
          grams,
          totalCalories: Math.round((grams / 100) * food.calories),
          totalProtein: Math.round((grams / 100) * (food.protein || 0) * 10) / 10
        };
        setDailyLogs(prev => ({ ...prev, [currentDate]: [...(prev[currentDate] || []), newLog] }));
        setSelectedFoodId(''); setGramsInput('');
      };

      const updateLogWeight = (logId, newGrams) => {
        const grams = parseFloat(newGrams) || 0;
        setDailyLogs(prev => {
          const dayLogs = prev[currentDate].map(log => {
            if (log.id === logId) {
              const food = foods.find(f => f.id === log.foodId);
              return {
                ...log,
                grams,
                totalCalories: Math.round((grams / 100) * (food?.calories || 0)),
                totalProtein: Math.round((grams / 100) * (food?.protein || 0) * 10) / 10
              };
            }
            return log;
          });
          return { ...prev, [currentDate]: dayLogs };
        });
        setEditingLogId(null);
      };

      const updateFoodBase = (id) => {
        setFoods(foods.map(f => f.id === id ? { ...f, ...editValue } : f));
        setDailyLogs(prev => {
          const newLogs = { ...prev };
          Object.keys(newLogs).forEach(date => {
            newLogs[date] = newLogs[date].map(log => {
              if (log.foodId === id) {
                const grams = log.grams;
                return {
                  ...log,
                  totalCalories: Math.round((grams / 100) * editValue.calories),
                  totalProtein: Math.round((grams / 100) * editValue.protein * 10) / 10
                };
              }
              return log;
            });
          });
          return newLogs;
        });
        setEditingFoodId(null);
      };

      const currentDayLogs = dailyLogs[currentDate] || [];
      const totalCals = currentDayLogs.reduce((sum, log) => sum + log.totalCalories, 0);
      const totalPro = currentDayLogs.reduce((sum, log) => sum + (log.totalProtein || 0), 0);
      const progressCals = Math.min(100, (totalCals / goals.calories) * 100);
      const progressPro = Math.min(100, (totalPro / goals.protein) * 100);

      return (
        <div className="flex flex-col h-[100dvh] w-full max-w-md mx-auto bg-[#09090b] text-zinc-100 font-sans shadow-2xl border-x border-zinc-900">
          
          <header className="shrink-0 pt-8 px-6 pb-4 bg-[#09090b] flex justify-between items-center">
            <div>
              <h1 className="text-2xl font-bold">{activeTab === 'diary' ? 'Дневник' : 'Настройки'}</h1>
              {activeTab === 'diary' && <div className="text-sm text-zinc-500 mt-1">{displayDate(currentDate)}</div>}
            </div>
            {activeTab === 'diary' && (
              <div className="flex gap-2 text-[10px] font-bold uppercase tracking-wider bg-[#18181b] p-2 rounded-xl border border-zinc-800/50">
                <span className="text-emerald-400">{totalCals} ккал</span>
                <span className="text-indigo-400">{totalPro.toFixed(1)} г</span>
              </div>
            )}
          </header>

          <main className="flex-1 overflow-y-auto px-5 pt-2 pb-8">
            {activeTab === 'diary' ? (
              <div className="space-y-4">
                
                {/* Дата скроллер */}
                <div className="flex items-center justify-between bg-[#18181b] rounded-2xl p-1 border border-zinc-800/50">
                  <button onClick={() => {const d = new Date(currentDate); d.setDate(d.getDate()-1); setCurrentDate(getLocalDateString(d));}} className="fast-touch p-3 text-zinc-400"><IconChevronLeft className="w-5 h-5" /></button>
                  <div className="font-bold text-sm text-zinc-200">{displayDate(currentDate)}</div>
                  <button onClick={() => {const d = new Date(currentDate); d.setDate(d.getDate()+1); setCurrentDate(getLocalDateString(d));}} disabled={currentDate === getLocalDateString(new Date())} className="fast-touch p-3 text-zinc-400 disabled:opacity-20"><IconChevronRight className="w-5 h-5" /></button>
                </div>

                {/* Прогресс */}
                <div className="bg-[#18181b] rounded-3xl p-5 shadow-xl border border-zinc-800/50">
                  <div className="flex justify-between items-end mb-4">
                    <div>
                      <div className="flex items-baseline gap-1">
                        <span className="text-4xl font-black">{totalCals}</span>
                        <span className="text-zinc-600 text-sm">/ {goals.calories}</span>
                      </div>
                      <p className="text-[10px] text-emerald-500 uppercase font-bold mt-1 tracking-widest">Калории</p>
                    </div>
                    <div className="text-right">
                      <div className="text-2xl font-black text-indigo-400">{totalPro.toFixed(1)}г</div>
                      <p className="text-[10px] text-zinc-500 uppercase font-bold mt-1 tracking-widest">Белок (цель {goals.protein}г)</p>
                    </div>
                  </div>
                  <div className="h-2 w-full bg-zinc-900 rounded-full overflow-hidden">
                    <div className="h-full bg-emerald-500 transition-all duration-500" style={{ width: `${progressCals}%` }}></div>
                  </div>
                </div>

                {/* Добавление записи */}
                <form onSubmit={handleAddLog} className="bg-[#18181b] rounded-3xl p-4 border border-zinc-800/50 flex gap-2">
                  <select className="flex-1 bg-[#27272a] rounded-2xl p-4 outline-none appearance-none text-zinc-200 text-sm font-medium truncate" value={selectedFoodId} onChange={(e) => setSelectedFoodId(e.target.value)} required>
                    <option value="" disabled>Выберите продукт</option>
                    {foods.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                  </select>
                  <input type="number" placeholder="гр" className="w-20 bg-[#27272a] rounded-2xl p-4 outline-none text-center text-zinc-200" value={gramsInput} onChange={(e) => setGramsInput(e.target.value)} required />
                  <button type="submit" className="w-14 shrink-0 bg-emerald-600 rounded-2xl flex items-center justify-center fast-touch active:scale-95 transition-transform"><IconPlus className="w-6 h-6 text-white" /></button>
                </form>

                {/* Список записей */}
                <div className="space-y-3 pt-2">
                  {currentDayLogs.map(log => (
                    <div key={log.id} className="bg-[#18181b] rounded-2xl p-4 flex justify-between items-center border border-zinc-800/30">
                      <div className="flex-1 cursor-pointer" onClick={() => { setEditingLogId(log.id); setEditValue({ grams: log.grams }); }}>
                        {editingLogId === log.id ? (
                          <div className="flex items-center gap-2">
                            <input autoFocus type="number" className="w-20 bg-zinc-900 rounded-lg p-2 text-sm outline-none border border-emerald-500 text-white" value={editValue.grams} onChange={(e) => setEditValue({grams: e.target.value})} onBlur={() => updateLogWeight(log.id, editValue.grams)} />
                            <span className="text-xs text-zinc-500">гр</span>
                          </div>
                        ) : (
                          <>
                            <p className="font-bold text-sm border-b border-zinc-800/50 inline-block">{foods.find(f => f.id === log.foodId)?.name || 'Удалено'}</p>
                            <p className="text-[10px] text-zinc-400 font-bold uppercase block mt-1 underline decoration-zinc-800 decoration-dotted">{log.grams}г</p>
                          </>
                        )}
                      </div>
                      <div className="flex items-center gap-4 text-right">
                        <div>
                          <div className="text-emerald-400 font-bold text-sm">{log.totalCalories}</div>
                          <div className="text-indigo-400 font-bold text-[9px]">{log.totalProtein}г</div>
                        </div>
                        <button onClick={() => setDailyLogs(prev => ({...prev, [currentDate]: prev[currentDate].filter(l => l.id !== log.id)}))} className="fast-touch text-zinc-700 active:text-red-500 p-2"><IconTrash className="w-5 h-5" /></button>
                      </div>
                    </div>
                  ))}
                  {currentDayLogs.length === 0 && <div className="text-center text-zinc-600 text-sm mt-10">Записей нет. Добавьте первый прием пищи.</div>}
                </div>
              </div>
            ) : (
              <div className="space-y-6">
                
                {/* Настройка Целей */}
                <div className="bg-[#18181b] rounded-3xl p-5 border border-zinc-800/50">
                  <h2 className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-4 flex items-center gap-2"><IconTarget className="w-4 h-4" /> Ваши цели</h2>
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <span className="text-[9px] text-zinc-500 font-bold block mb-1">ККАЛ</span>
                      <input type="number" className="w-full bg-[#27272a] rounded-xl p-3 text-emerald-400 font-bold outline-none" value={goals.calories} onChange={(e) => setGoals({...goals, calories: e.target.value})} />
                    </div>
                    <div>
                      <span className="text-[9px] text-zinc-500 font-bold block mb-1">БЕЛОК (Г)</span>
                      <input type="number" className="w-full bg-[#27272a] rounded-xl p-3 text-indigo-400 font-bold outline-none" value={goals.protein} onChange={(e) => setGoals({...goals, protein: e.target.value})} />
                    </div>
                  </div>
                </div>

                {/* Добавление в справочник */}
                <form onSubmit={(e) => {e.preventDefault(); setFoods([{id: Date.now().toString(), name: newFoodName, calories: parseFloat(newFoodCals), protein: parseFloat(newFoodProtein)}, ...foods]); setNewFoodName(''); setNewFoodCals(''); setNewFoodProtein('');}} className="bg-[#18181b] rounded-3xl p-5 border border-zinc-800/50 space-y-4">
                  <h2 className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Новый продукт в базу</h2>
                  <input type="text" placeholder="Название" className="w-full bg-[#27272a] rounded-xl p-3 outline-none text-zinc-200" value={newFoodName} onChange={(e) => setNewFoodName(e.target.value)} required />
                  <div className="grid grid-cols-2 gap-3">
                    <input type="number" placeholder="Ккал на 100г" className="w-full bg-[#27272a] rounded-xl p-3 outline-none text-zinc-200" value={newFoodCals} onChange={(e) => setNewFoodCals(e.target.value)} required />
                    <input type="number" placeholder="Белок на 100г" className="w-full bg-[#27272a] rounded-xl p-3 outline-none text-zinc-200" value={newFoodProtein} onChange={(e) => setNewFoodProtein(e.target.value)} required />
                  </div>
                  <button type="submit" className="fast-touch w-full bg-emerald-600 text-white rounded-xl p-4 font-bold active:scale-95 transition-transform">Добавить в список</button>
                </form>

                {/* Справочник */}
                <div className="space-y-2">
                  <h2 className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-2 px-1">База продуктов ({foods.length})</h2>
                  {foods.map(f => (
                    <div key={f.id} className="bg-[#18181b] rounded-xl p-3 border border-zinc-800/30">
                      {editingFoodId === f.id ? (
                        <div className="space-y-3">
                           <input autoFocus className="w-full bg-zinc-900 rounded-lg p-2 text-sm text-white border border-indigo-500 outline-none" value={editValue.name} onChange={e => setEditValue({...editValue, name: e.target.value})} />
                           <div className="grid grid-cols-2 gap-2">
                              <input type="number" className="bg-zinc-900 rounded-lg p-2 text-sm text-emerald-400 outline-none" value={editValue.calories} onChange={e => setEditValue({...editValue, calories: parseFloat(e.target.value)})} />
                              <input type="number" className="bg-zinc-900 rounded-lg p-2 text-sm text-indigo-400 outline-none" value={editValue.protein} onChange={e => setEditValue({...editValue, protein: parseFloat(e.target.value)})} />
                           </div>
                           <button onClick={() => updateFoodBase(f.id)} className="w-full bg-emerald-600 p-2 rounded-lg flex justify-center"><IconCheck className="w-5 h-5 text-white" /></button>
                        </div>
                      ) : (
                        <div className="flex justify-between items-center cursor-pointer" onClick={() => { setEditingFoodId(f.id); setEditValue(f); }}>
                          <div className="flex-1">
                            <span className="text-sm font-medium border-b border-zinc-800/50">{f.name}</span>
                            <div className="flex gap-2 text-[10px] font-bold uppercase mt-1">
                              <span className="text-emerald-500">{f.calories} ккал</span>
                              <span className="text-indigo-500">{f.protein || 0} г</span>
                            </div>
                          </div>
                          <button onClick={(e) => { e.stopPropagation(); setFoods(foods.filter(x => x.id !== f.id)); }} className="fast-touch text-zinc-800 active:text-red-500 p-2"><IconTrash className="w-5 h-5" /></button>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            )}
          </main>

          <nav className="shrink-0 bg-[#09090b] flex justify-around pb-2 pt-2 safe-pb relative z-40 border-t border-zinc-900">
            <button onClick={() => setActiveTab('diary')} className={`fast-touch w-32 flex flex-col items-center py-2 transition-all rounded-xl ${activeTab === 'diary' ? 'text-emerald-400 bg-zinc-900/50' : 'text-zinc-600'}`}>
              <IconCalendar className="w-6 h-6" /><span className="text-[10px] font-bold mt-1 uppercase tracking-widest">Дневник</span>
            </button>
            <button onClick={() => setActiveTab('directory')} className={`fast-touch w-32 flex flex-col items-center py-2 transition-all rounded-xl ${activeTab === 'directory' ? 'text-indigo-400 bg-zinc-900/50' : 'text-zinc-600'}`}>
              <IconBook className="w-6 h-6" /><span className="text-[10px] font-bold mt-1 uppercase tracking-widest">База</span>
            </button>
          </nav>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
