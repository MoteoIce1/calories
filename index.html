<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Трекер Диеты</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    body { background-color: #000; margin: 0; padding: 0; overscroll-behavior-y: none; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; color: white; }
    .safe-pb { padding-bottom: max(16px, env(safe-area-inset-bottom)); }
    ::-webkit-scrollbar { width: 0px; }
    input[type="date"]::-webkit-calendar-picker-indicator { display: none; -webkit-appearance: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const firebaseConfig = {
      apiKey: "AIzaSyBg9rVgF6WUjuu9abFvV_1KCHdSW3fZ5uQ",
      authDomain: "my-test-db-de78c.firebaseapp.com",
      projectId: "my-test-db-de78c",
      storageBucket: "my-test-db-de78c.firebasestorage.app",
      messagingSenderId: "30801099639",
      appId: "1:30801099639:web:585da0bba1f27d4a6fff72"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection('users').doc('main_profile');

    const { useState, useEffect } = React;

    const getLocalDateString = (d) => d.toISOString().split('T')[0];

    function App() {
      const [isLoading, setIsLoading] = useState(true);
      const [currentDate, setCurrentDate] = useState(getLocalDateString(new Date()));
      const [dailyLogs, setDailyLogs] = useState({});
      const [foods, setFoods] = useState([]);
      const [goals, setGoals] = useState({ calories: 1800, protein: 150 });
      const [activeTab, setActiveTab] = useState('diary');

      useEffect(() => {
        return docRef.onSnapshot(doc => {
          if (doc.exists) {
            const data = doc.data();
            setDailyLogs(data.dailyLogs || {});
            setFoods(data.foods || []);
            setGoals(data.goals || { calories: 1800, protein: 150 });
          }
          setIsLoading(false);
        });
      }, []);

      const hasData = (date) => dailyLogs[date] && dailyLogs[date].length > 0;

      const deleteLog = (id) => {
        const updated = { ...dailyLogs, [currentDate]: dailyLogs[currentDate].filter(l => l.id !== id) };
        setDailyLogs(updated);
        docRef.update({ dailyLogs: updated });
      };

      const currentDayLogs = dailyLogs[currentDate] || [];
      const totalCals = currentDayLogs.reduce((sum, log) => sum + log.totalCalories, 0);
      const totalPro = currentDayLogs.reduce((sum, log) => sum + (log.totalProtein || 0), 0);

      if (isLoading) return <div className="h-screen flex items-center justify-center bg-black text-zinc-500 text-sm">ЗАГРУЗКА...</div>;

      return (
        <div className="flex flex-col h-[100dvh] max-w-md mx-auto bg-[#09090b]">
          
          {/* HEADER С ИСПРАВЛЕННЫМ КАЛЕНДАРЕМ */}
          <header className="px-6 pt-10 pb-4 border-b border-zinc-900 bg-black/50 backdrop-blur-xl">
            <div className="flex items-center justify-between bg-zinc-900/50 rounded-2xl p-1 border border-zinc-800/50">
              <button 
                onClick={() => {
                  const d = new Date(currentDate); d.setDate(d.getDate() - 1);
                  setCurrentDate(getLocalDateString(d));
                }}
                className="p-3 text-zinc-400 active:scale-90 transition-transform"
              >
                <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="m15 18-6-6 6-6"/></svg>
              </button>

              <div className="flex flex-col items-center flex-1 relative h-10 justify-center">
                <div className="flex items-center gap-2">
                  {/* Зеленый индикатор, если есть данные */}
                  {hasData(currentDate) && <div className="w-1.5 h-1.5 bg-emerald-500 rounded-full shadow-[0_0_8px_rgba(16,185,129,0.5)]"></div>}
                  <span className="font-bold text-sm tracking-tight text-zinc-200">
                    {currentDate === getLocalDateString(new Date()) ? "СЕГОДНЯ" : currentDate}
                  </span>
                </div>
                
                {/* Невидимый инпут для вызова календаря */}
                <input 
                  type="date" 
                  className="absolute inset-0 opacity-0 w-full cursor-pointer"
                  value={currentDate}
                  onChange={(e) => e.target.value && setCurrentDate(e.target.value)}
                />

                {/* Та самая кнопка ВМЕСТО сброса, которая возвращает в сегодня */}
                {currentDate !== getLocalDateString(new Date()) && (
                  <button 
                    onClick={() => setCurrentDate(getLocalDateString(new Date()))}
                    className="absolute -bottom-6 text-[9px] font-black text-emerald-500 uppercase tracking-widest bg-emerald-500/10 px-2 py-0.5 rounded border border-emerald-500/20"
                  >
                    Вернуться в сегодня
                  </button>
                )}
              </div>

              <button 
                onClick={() => {
                  const d = new Date(currentDate); d.setDate(d.getDate() + 1);
                  setCurrentDate(getLocalDateString(d));
                }}
                className="p-3 text-zinc-400 active:scale-90 transition-transform"
              >
                <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="m9 18 6-6-6-6"/></svg>
              </button>
            </div>
          </header>

          <main className="flex-1 overflow-y-auto px-5 py-6 space-y-6">
            {/* ПРОГРЕСС БАРЫ */}
            <div className="grid grid-cols-2 gap-3">
              <div className="bg-zinc-900/40 p-4 rounded-3xl border border-zinc-800/50">
                <div className="text-[10px] text-zinc-500 font-bold uppercase mb-1">Калории</div>
                <div className="text-xl font-black text-zinc-100">{totalCals} <span className="text-xs text-zinc-600 font-normal">/ {goals.calories}</span></div>
                <div className="mt-2 h-1.5 bg-zinc-800 rounded-full overflow-hidden">
                  <div className="h-full bg-emerald-500" style={{width: `${Math.min(100, (totalCals/goals.calories)*100)}%`}}></div>
                </div>
              </div>
              <div className="bg-zinc-900/40 p-4 rounded-3xl border border-zinc-800/50">
                <div className="text-[10px] text-zinc-500 font-bold uppercase mb-1">Белок</div>
                <div className="text-xl font-black text-zinc-100">{totalPro}г <span className="text-xs text-zinc-600 font-normal">/ {goals.protein}г</span></div>
                <div className="mt-2 h-1.5 bg-zinc-800 rounded-full overflow-hidden">
                  <div className="h-full bg-blue-500" style={{width: `${Math.min(100, (totalPro/goals.protein)*100)}%`}}></div>
                </div>
              </div>
            </div>

            {/* СПИСОК ЗАПИСЕЙ */}
            <div className="space-y-3">
              {currentDayLogs.length === 0 ? (
                <div className="py-10 text-center text-zinc-600 text-sm italic">Записей нет</div>
              ) : (
                currentDayLogs.map(log => {
                  const food = foods.find(f => f.id === log.foodId);
                  return (
                    <div key={log.id} className="flex items-center justify-between p-4 bg-zinc-900/60 rounded-2xl border border-zinc-800/30">
                      <div>
                        <div className="font-bold text-zinc-200">{food?.name || 'Удалено'}</div>
                        <div className="text-[10px] text-zinc-500 uppercase font-bold">{log.grams}г • {log.totalCalories} ккал • {log.totalProtein}г Б</div>
                      </div>
                      <button onClick={() => deleteLog(log.id)} className="p-2 text-zinc-700 active:text-red-500">
                        <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6"/></svg>
                      </button>
                    </div>
                  );
                })
              )}
            </div>
          </main>

          {/* НАВИГАЦИЯ (заглушка) */}
          <nav className="safe-pb px-8 py-4 bg-black border-t border-zinc-900 flex justify-around">
            <button className="text-emerald-500"><svg className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg></button>
            <button className="text-zinc-600"><svg className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg></button>
          </nav>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
