<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Smart Diet Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <style>
    body { background-color: #09090b; color: white; -webkit-tap-highlight-color: transparent; font-family: sans-serif; }
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1); /* Делает иконку календаря белой */
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // Конфигурация Firebase остается прежней (из вашего кода)
    const firebaseConfig = {
      apiKey: "AIzaSyBg9rVgF6WUjuu9abFvV_1KCHdSW3fZ5uQ",
      authDomain: "my-test-db-de78c.firebaseapp.com",
      projectId: "my-test-db-de78c",
      storageBucket: "my-test-db-de78c.firebasestorage.app",
      messagingSenderId: "30801099639",
      appId: "1:30801099639:web:585da0bba1f27d4a6fff72"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection('users').doc('main_profile');

    const { useState, useEffect } = React;

    // Вспомогательная функция для получения даты
    const getToday = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    };

    function App() {
      const [currentDate, setCurrentDate] = useState(getToday());
      const [dailyLogs, setDailyLogs] = useState({});
      const [foods, setFoods] = useState([]);
      const [goals, setGoals] = useState({ calories: 1800, protein: 150 });
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const unsub = docRef.onSnapshot(doc => {
          if (doc.exists) {
            const d = doc.data();
            setDailyLogs(d.dailyLogs || {});
            setFoods(d.foods || []);
            setGoals(d.goals || { calories: 1800, protein: 150 });
          }
          setLoading(false);
        });
        return unsub;
      }, []);

      const hasData = (date) => dailyLogs[date] && dailyLogs[date].length > 0;

      if (loading) return <div className="h-screen flex items-center justify-center text-zinc-500">Загрузка...</div>;

      return (
        <div className="max-w-md mx-auto min-h-screen bg-[#09090b] pb-20">
          {/* HEADER С УЛУЧШЕННЫМ КАЛЕНДАРЕМ */}
          <header className="p-6 border-b border-zinc-800 bg-[#09090b]/80 backdrop-blur-md sticky top-0 z-50">
            <div className="flex items-center justify-between">
              <button 
                onClick={() => {
                  const d = new Date(currentDate);
                  d.setDate(d.getDate() - 1);
                  setCurrentDate(d.toISOString().split('T')[0]);
                }}
                className="p-2 text-zinc-400 active:text-white transition-colors"
              >
                ←
              </button>

              <div className="flex flex-col items-center">
                <div className="relative">
                  <div className={`flex items-center gap-2 px-4 py-1 rounded-lg transition-colors ${hasData(currentDate) ? 'bg-emerald-500/10 border border-emerald-500/20' : 'bg-zinc-900 border border-zinc-800'}`}>
                    {hasData(currentDate) && <div className="w-2 h-2 bg-emerald-500 rounded-full shadow-[0_0_8px_rgba(16,185,129,0.5)]"></div>}
                    <span className={`font-bold ${hasData(currentDate) ? 'text-emerald-400' : 'text-zinc-200'}`}>
                      {currentDate === getToday() ? "Сегодня" : currentDate}
                    </span>
                  </div>
                  <input 
                    type="date" 
                    className="absolute inset-0 opacity-0 cursor-pointer"
                    value={currentDate}
                    onChange={(e) => e.target.value && setCurrentDate(e.target.value)}
                  />
                </div>
                
                {currentDate !== getToday() && (
                  <button 
                    onClick={() => setCurrentDate(getToday())}
                    className="mt-2 text-[10px] font-black uppercase tracking-widest text-emerald-500 bg-emerald-500/10 px-3 py-1 rounded-full border border-emerald-500/20 animate-in fade-in zoom-in duration-300"
                  >
                    К сегодня
                  </button>
                )}
              </div>

              <button 
                onClick={() => {
                  const d = new Date(currentDate);
                  d.setDate(d.getDate() + 1);
                  setCurrentDate(d.toISOString().split('T')[0]);
                }}
                className="p-2 text-zinc-400 active:text-white transition-colors"
              >
                →
              </button>
            </div>
          </header>

          <div className="p-6 text-center text-zinc-500">
            {hasData(currentDate) 
              ? <div className="text-emerald-500/80 text-sm">Данные за этот день сохранены ✓</div>
              : <div className="text-sm">Данных за этот день пока нет</div>
            }
          </div>
          
          {/* Остальной контент (Дневник, База и т.д.) */}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
