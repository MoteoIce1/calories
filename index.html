<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Трекер Диеты</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background-color: #000; color: #fff; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }
    .safe-pb { padding-bottom: max(16px, env(safe-area-inset-bottom)); }
    input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .glass { background: #18181b; border: 1px solid #27272a; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Иконки
    const IconPlus = () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4"/></svg>;
    const IconTrash = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>;

    // ПРЕДУСТАНОВЛЕННЫЕ ПРОДУКТЫ (Твои данные + диета)
    const DEFAULT_FOODS = [
      // Из твоих скриншотов
      { id: 'c1', name: 'Котлета (говядина)', calories: 255, protein: 25 },
      { id: 'c2', name: 'Картофельное пюре (на воде)', calories: 75, protein: 2 },
      { id: 'c3', name: 'Оливковое масло', calories: 884, protein: 0 },
      { id: 'c4', name: 'Помидор', calories: 19, protein: 1 },
      { id: 'c5', name: 'Огурец', calories: 15, protein: 1 },
      { id: 'c6', name: 'Батончик Snaq Fabriq', calories: 454, protein: 20 },
      { id: 'c7', name: 'Печенье', calories: 278, protein: 35 },
      { id: 'c8', name: 'Пастеризованные белки', calories: 48, protein: 11 },
      { id: 'c9', name: 'Гречка вареная', calories: 132, protein: 4.5 },
      { id: 'c10', name: 'Куриное филе (готовое)', calories: 113, protein: 23.6 },
      
      // Базовый диетический набор
      { id: 'd1', name: 'Творог 5%', calories: 121, protein: 17 },
      { id: 'd2', name: 'Яйцо вареное (1шт)', calories: 155, protein: 13 },
      { id: 'd3', name: 'Рис белый вареный', calories: 130, protein: 2.7 },
      { id: 'd4', name: 'Овсянка на воде', calories: 88, protein: 3 },
      { id: 'd5', name: 'Яблоко', calories: 52, protein: 0.3 },
      { id: 'd6', name: 'Миндаль', calories: 579, protein: 21 }
    ];

    function App() {
      const [activeTab, setActiveTab] = useState('diary');
      const [goals, setGoals] = useState(() => JSON.parse(localStorage.getItem('goals')) || { calories: 1800, protein: 150 });
      const [foods, setFoods] = useState(() => {
        const saved = JSON.parse(localStorage.getItem('user_foods')) || [];
        return [...DEFAULT_FOODS, ...saved];
      });
      const [logs, setLogs] = useState(() => JSON.parse(localStorage.getItem('logs')) || {});
      const [selectedFood, setSelectedFood] = useState('');
      const [weight, setWeight] = useState('');

      const today = new Date().toISOString().split('T')[0];

      useEffect(() => localStorage.setItem('goals', JSON.stringify(goals)), [goals]);
      useEffect(() => localStorage.setItem('logs', JSON.stringify(logs)), [logs]);
      useEffect(() => {
        const customOnly = foods.filter(f => !DEFAULT_FOODS.find(df => df.id === f.id));
        localStorage.setItem('user_foods', JSON.stringify(customOnly));
      }, [foods]);

      const addEntry = () => {
        if (!selectedFood || !weight) return;
        const food = foods.find(f => f.id === selectedFood);
        const entry = {
          id: Date.now(),
          name: food.name,
          cals: Math.round((food.calories * weight) / 100),
          pro: Math.round((food.protein * weight) / 100 * 10) / 10,
          weight: weight
        };
        const dayLogs = logs[today] || [];
        setLogs({ ...logs, [today]: [...dayLogs, entry] });
        setWeight('');
      };

      const deleteLog = (id) => {
        setLogs({ ...logs, [today]: logs[today].filter(l => l.id !== id) });
      };

      const currentLogs = logs[today] || [];
      const totalCals = currentLogs.reduce((s, i) => s + i.cals, 0);
      const totalPro = currentLogs.reduce((s, i) => s + i.pro, 0);

      return (
        <div className="flex flex-col h-screen max-w-md mx-auto bg-black">
          {/* Header */}
          <div className="p-6 pb-2">
            <h1 className="text-2xl font-bold">{activeTab === 'diary' ? 'Дневник' : 'Настройки'}</h1>
            <p className="text-zinc-500 text-sm">Сегодня: {new Date().toLocaleDateString('ru-RU')}</p>
          </div>

          <div className="flex-1 overflow-y-auto px-4 space-y-4">
            {activeTab === 'diary' ? (
              <>
                {/* Progress Card */}
                <div className="glass rounded-3xl p-5">
                  <div className="flex justify-between mb-4">
                    <div>
                      <div className="text-3xl font-bold">{totalCals} <span className="text-sm text-zinc-500 font-normal">/ {goals.calories}</span></div>
                      <div className="text-[10px] uppercase text-emerald-500 font-bold tracking-widest">Калории</div>
                    </div>
                    <div className="text-right">
                      <div className="text-2xl font-bold text-indigo-400">{totalPro.toFixed(1)}г</div>
                      <div className="text-[10px] uppercase text-zinc-500 font-bold">Белок (цель {goals.protein}г)</div>
                    </div>
                  </div>
                  <div className="w-full bg-zinc-800 h-2 rounded-full overflow-hidden">
                    <div className="bg-emerald-500 h-full transition-all" style={{width: `${Math.min(100, (totalCals/goals.calories)*100)}%`}}></div>
                  </div>
                </div>

                {/* Quick Add */}
                <div className="glass rounded-2xl p-4 flex gap-2">
                  <select 
                    className="flex-1 bg-zinc-800 rounded-xl px-3 py-3 text-sm outline-none"
                    value={selectedFood}
                    onChange={e => setSelectedFood(e.target.value)}
                  >
                    <option value="">Выберите продукт</option>
                    {foods.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                  </select>
                  <input 
                    type="number" 
                    placeholder="гр" 
                    className="w-20 bg-zinc-800 rounded-xl px-3 text-center outline-none"
                    value={weight}
                    onChange={e => setWeight(e.target.value)}
                  />
                  <button onClick={addEntry} className="w-12 h-12 bg-emerald-600 rounded-xl flex items-center justify-center active:scale-90 transition-transform">
                    <IconPlus />
                  </button>
                </div>

                {/* Daily List */}
                <div className="space-y-2 pb-20">
                  {currentLogs.map(log => (
                    <div key={log.id} className="glass rounded-2xl p-4 flex justify-between items-center">
                      <div>
                        <div className="font-bold text-sm">{log.name}</div>
                        <div className="text-xs text-zinc-500">{log.weight}г • <span className="text-emerald-500">{log.cals} ккал</span> • <span className="text-indigo-400">{log.pro}г б</span></div>
                      </div>
                      <button onClick={() => deleteLog(log.id)} className="text-zinc-700 active:text-red-500 px-2"><IconTrash /></button>
                    </div>
                  ))}
                </div>
              </>
            ) : (
              /* Settings Tab */
              <div className="space-y-6">
                <div className="glass rounded-2xl p-5 space-y-4">
                  <h3 className="text-xs font-bold text-zinc-500 uppercase tracking-widest">Цели дня</h3>
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="text-[10px] text-zinc-500 block mb-1">ККАЛ</label>
                      <input type="number" className="w-full bg-zinc-800 rounded-xl p-3 font-bold" value={goals.calories} onChange={e => setGoals({...goals, calories: e.target.value})}/>
                    </div>
                    <div>
                      <label className="text-[10px] text-zinc-500 block mb-1">БЕЛОК (Г)</label>
                      <input type="number" className="w-full bg-zinc-800 rounded-xl p-3 font-bold" value={goals.protein} onChange={e => setGoals({...goals, protein: e.target.value})}/>
                    </div>
                  </div>
                </div>

                <div className="space-y-2">
                  <h3 className="text-xs font-bold text-zinc-500 uppercase px-1">Ваша база продуктов</h3>
                  {foods.map(f => (
                    <div key={f.id} className="glass rounded-xl p-3 flex justify-between items-center opacity-80">
                      <div>
                        <div className="text-sm font-medium">{f.name}</div>
                        <div className="text-[10px] text-zinc-500 uppercase">{f.calories} ккал / {f.protein}г белка</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>

          {/* Navigation */}
          <nav className="glass border-t-0 rounded-t-3xl flex justify-around pt-3 safe-pb">
            <button onClick={() => setActiveTab('diary')} className={`flex flex-col items-center p-3 ${activeTab === 'diary' ? 'text-emerald-500' : 'text-zinc-600'}`}>
              <div className="text-xs font-bold uppercase tracking-tighter">Дневник</div>
            </button>
            <button onClick={() => setActiveTab('settings')} className={`flex flex-col items-center p-3 ${activeTab === 'settings' ? 'text-indigo-500' : 'text-zinc-600'}`}>
              <div className="text-xs font-bold uppercase tracking-tighter">База</div>
            </button>
          </nav>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
